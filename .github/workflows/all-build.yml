name: Build All Projects

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5
    
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    
    - name: Install .NET MAUI Workload
      run: dotnet workload install maui --skip-sign-check
    
    - name: Restore dependencies
      run: dotnet restore Strada.slnx

    - name: Build ExcelImport
      run: dotnet build ExcelImport/ExcelImport.csproj --no-restore --configuration Release    

    - name: Build Strada.Library
      run: dotnet build Strada.Library/Strada.Library.csproj --no-restore --configuration Release
    
    - name: Build Strada.Shared
      run: dotnet build Strada/Strada.Shared/Strada.Shared.csproj --no-restore --configuration Release
    
    - name: Build Strada.Web
      run: dotnet build Strada/Strada.Web/Strada.Web.csproj --no-restore --configuration Release
    
    - name: Build Strada MAUI (Android)
      run: dotnet build Strada/Strada/Strada.csproj --configuration Release --framework net10.0-android
    
    - name: Build Strada MAUI (Windows)
      run: dotnet build Strada/Strada/Strada.csproj --configuration Release --framework net10.0-windows10.0.19041.0
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Build SQL Server Database Project
      run: msbuild Strada.Database/Strada.Database.sqlproj /p:Configuration=Release /p:Platform="Any CPU"
