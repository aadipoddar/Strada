name: Deploy for Windows

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  version-check:
    uses: ./.github/workflows/version-checks.yml

  build:
    runs-on: windows-latest
    needs: version-check
    if: needs.version-check.outputs.should-deploy == 'true'

    steps:
    - uses: actions/checkout@v5
    
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - name: Install .NET MAUI Workload
      run: dotnet workload install maui --skip-sign-check
    
    - name: Create Secrets.local_secrets.cs
      run: |
        $secretsContent = @"
        namespace StradaLibrary.DataAccess;

        public static partial class Secrets
        {
            static Secrets()
            {
                AzureConnectionString = "${{ secrets.AzureConnectionString }}";

                AzureBlobStorageConnectionString = "${{ secrets.AzureBlobStorageConnectionString }}";
                AzureBlobStorageAccountKey = "${{ secrets.AzureBlobStorageAccountKey }}";

                SyncfusionLicense = "${{ secrets.SyncfusionLicense }}";

                EmailPassword = "${{ secrets.EmailPassword }}";
                ToEmail = "${{ secrets.ToEmail }}";
            }
        }
        "@
        Set-Content -Path "StradaLibrary/DataAccess/Secrets.local_secrets.cs" -Value $secretsContent
    
    - name: Restore dependencies
      run: dotnet restore Strada/Strada/Strada.csproj
    
    - name: Publish Windows MAUI App
      run: dotnet publish Strada/Strada/Strada.csproj -f net10.0-windows10.0.19041.0 -c Release -p:WindowsPackageType=None -o Strada/Strada/publish/windows
    
    - name: Create Zip Archive
      run: Compress-Archive -Path "Strada/Strada/publish/windows/*" -DestinationPath "Strada.zip" -Force
    
    - name: Upload Windows Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release
        path: Strada.zip

  deploy:
    runs-on: windows-latest
    needs: [version-check, build]
    if: needs.version-check.outputs.should-deploy == 'true'
    permissions:
      contents: write

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: windows-release
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.version-check.outputs.current-version }}
        name: ${{ github.event.head_commit.message }}
        files: Strada.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Deployment Summary
      run: |
        echo "🚀 Successfully deployed Strada Windows version ${{ needs.version-check.outputs.current-version }} to GitHub Releases"
