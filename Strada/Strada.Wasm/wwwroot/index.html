<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strada</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />

    <link rel="stylesheet" href="_content/Strada.Shared/lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="_content/Strada.Shared/app.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="Strada.Wasm.styles.css" />

    <link rel="icon" type="image/png" href="images/logo.png" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" href="images/logo.png" />
    <script type="importmap"></script>

    <link href="_content/Syncfusion.Blazor.Themes/tailwind3.css" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />

    <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>

    <script src="_content/Syncfusion.Blazor.Core/scripts/syncfusion-blazor.min.js" type="text/javascript"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <script src="_content/Strada.Shared/js/documentExportService.js"></script>
    <script src="_content/Strada.Shared/js/playSound.js"></script>
    <script src="_content/Strada.Shared/js/closeGuard.js"></script>

    <!-- Leaflet map (Live Fleet Map) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="_content/Strada.Shared/js/fleetMap.js"></script>

    <!-- GSAP Animation Libraries for Yeti Login -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://assets.codepen.io/16327/MorphSVGPlugin3.min.js"></script>
    <script src="_content/Strada.Shared/js/yetiAnimation.js"></script>

</html>
